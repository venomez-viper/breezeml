site_name: BreezeML
site_description: A beginner-friendly, production-aware ML workflow layer for students, analysts, and AI agents.
site_url: https://venomez-viper.github.io/breezeml/
repo_url: https://github.com/venomez-viper/breezeml
repo_name: venomez-viper/breezeml

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Examples: examples.md
  - Architecture: architecture.md
  - Guides:
      - AutoML (budget search): guides/automl.md
      - Time Series (forecasting): guides/timeseries.md
      - Drift Monitoring: guides/drift.md
      - Export (no lock-in): guides/export.md
      - Model Cards & Narration: guides/model-cards.md
      - Deploy (FastAPI + Docker): guides/deploy.md
      - MCP Server (AI agents): guides/mcp.md
      - Honest ML (audit, fairness, imbalance, blend): guides/honest-ml.md
      - Toolkits (track, anomaly, semi-supervised, CLI): guides/toolkits.md
  - Benchmarks: benchmarks.md
  - API Reference:
      - Core: api/core.md
      - Classifiers: api/classifiers.md
      - Regressors: api/regressors.md
      - Features: api/features.md
      - Clustering: api/clustering.md
      - Text Embeddings: api/text.md
      - Explainability: api/explain.md
      - Plotting: api/plot.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
